services:
  fabhome:
    build: .
    container_name: fabhome
    ports:
      - "${FABHOME_PORT:-3001}:3000"
    volumes:
      - ./data:/app/data
      - ./icons:/app/static/icons
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_DEBUG: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:3000/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 256m
