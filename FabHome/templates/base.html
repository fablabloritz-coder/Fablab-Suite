<!DOCTYPE html>
<html lang="fr" data-bs-theme="{{ 'light' if settings.get('theme') == 'light' else 'dark' }}"
      data-fh-theme="{{ settings.get('theme', 'dark') }}"
      {% if settings.get('theme') == 'custom' %}style="--fh-custom-accent:{{ settings.get('custom_accent', '#ff6b35') }};--fh-custom-bg:{{ settings.get('custom_bg', '#0f0f1a') }};--fh-custom-card-bg:{{ settings.get('custom_card_bg', '#1a1a2e') }};--fh-custom-text:{{ settings.get('custom_text', '#e0e0e0') }}"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.get('title', 'FabHome') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:9999;"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Modal Nouveautés (affiché une fois par version) -->
    <div class="modal fade" id="updatesModal" tabindex="-1" aria-labelledby="updatesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="updatesModalLabel">
                        <i class="bi bi-stars me-2 text-primary"></i>Nouveautés de la mise à jour
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-2 small text-muted" id="updatesVersionLine"></div>
                    <ul class="mb-0" id="updatesList"></ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">J'ai compris</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center text-muted py-2 mt-2" style="font-size:0.75rem;">
        <a href="#" class="text-muted text-decoration-none" onclick="showUpdatesModal(); return false;">
            <i class="bi bi-stars me-1"></i>Voir les nouveautés
        </a>
    </footer>

    <script>
    (function() {
        const RELEASE_INFO = {
            version: '1.5.0',
            date: '2026-04-10',
            title: 'Suite FabLab & améliorations hub',
            notes: [
                'Intégration FabLab Suite : enregistrement et monitoring de toutes les apps.',
                'Dashboard enrichi : widgets dynamiques par app, proxy manifest/health.',
                'Liens navigateur corrigés : host.docker.internal remplacer par localhost pour usage local.',
                'Popup de nouveautés après mise à jour (une fois par version).'
            ]
        };

        const STORAGE_KEY = 'fabhome:last_seen_release';

        function isDismissedForCurrentVersion() {
            try { return localStorage.getItem(STORAGE_KEY) === RELEASE_INFO.version; } catch (_) { return false; }
        }

        function markDismissed() {
            try { localStorage.setItem(STORAGE_KEY, RELEASE_INFO.version); } catch (_) {}
        }

        function fillModalContent() {
            const versionLine = document.getElementById('updatesVersionLine');
            const updatesList = document.getElementById('updatesList');
            if (!versionLine || !updatesList) return false;
            versionLine.textContent = `Version ${RELEASE_INFO.version} - ${RELEASE_INFO.date} - ${RELEASE_INFO.title}`;
            updatesList.innerHTML = RELEASE_INFO.notes.map(note => `<li class="mb-2">${note}</li>`).join('');
            return true;
        }

        function maybeShowUpdatesModal() {
            const modalEl = document.getElementById('updatesModal');
            if (!modalEl) return;
            if (isDismissedForCurrentVersion()) return;
            if (!fillModalContent()) return;
            const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
            modalEl.addEventListener('hidden.bs.modal', markDismissed, { once: true });
            modal.show();
        }

        window.showUpdatesModal = function() {
            fillModalContent();
            const modalEl = document.getElementById('updatesModal');
            if (!modalEl) return;
            bootstrap.Modal.getOrCreateInstance(modalEl).show();
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeShowUpdatesModal);
        } else {
            maybeShowUpdatesModal();
        }
    })();
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
